<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StrettoNews - Reggio & Messina</title>
    <style>
        :root {
            --primary: #1e555c;
            --accent: #f4d35e;
            --dark: #0d3b41;
            --light: #f7fff7;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light);
            color: var(--dark);
        }
        header {
            background-color: var(--primary);
            color: white;
            padding: 20px 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        header h1 { margin: 0; font-size: 24px; }
        header p { margin: 5px 0 0 0; font-size: 14px; opacity: 0.9; }
        
        .container {
            max-width: 600px;
            margin: 15px auto;
            padding: 0 15px;
        }
        .filters {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            background-color: #fafafa;
            margin-bottom: 15px;
            outline: none;
        }
        select:focus { border-color: var(--primary); }
        
        .categories {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        .btn {
            background-color: #f0f0f0;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            color: var(--dark);
        }
        .btn.active {
            background-color: var(--primary);
            color: white;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .news-card {
            background: white;
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid var(--primary);
        }
        .source-tag {
            display: inline-block;
            background-color: #e8f1f2;
            color: var(--primary);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .news-card h3 {
            margin: 0 0 8px 0;
            font-size: 18px;
            line-height: 1.4;
        }
        .news-card p {
            margin: 0 0 12px 0;
            font-size: 14px;
            color: #555;
            line-height: 1.5;
        }
        .news-card a {
            display: inline-block;
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }
        .news-card a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<header>
    <h1>🌊 StrettoNews</h1>
    <p>Notizie in tempo reale tra Scilla e Cariddi</p>
</header>

<div class="container">
    <div class="filters">
        <label for="provincia">Seleziona la tua Provincia:</label>
        <select id="provincia" onchange="gestisciSelezioneProvincia()">
            <option value="">-- Scegli la città --</option>
            <option value="RC">Reggio Calabria</option>
            <option value="ME">Messina</option>
        </select>

        <label>Scegli la Categoria:</label>
        <div class="categories">
            <button class="btn" id="cat-cronaca" onclick="cambiaCategoria('cronaca')" disabled>📰 Cronaca</button>
            <button class="btn" id="cat-politica" onclick="cambiaCategoria('politica')" disabled>🏛️ Politica</button>
            <button class="btn" id="cat-sport" onclick="cambiaCategoria('sport')" disabled>⚽ Sport</button>
            <button class="btn" id="cat-attualita" onclick="cambiaCategoria('attualita')" disabled>🌟 Attualità</button>
        </div>
    </div>

    <div id="news-feed">
        <p style="text-align: center; color: #666; font-size: 14px;">Scegli una provincia per iniziare a leggere.</p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
