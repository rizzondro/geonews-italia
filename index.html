<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pannello Cronaca Messina - Intelligence Dashboard</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #131a2c;
            --border-color: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-gds: #3b82f6;
            --accent-ls: #b91c1c;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #020617;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            margin: 0;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 800;
            color: #f8fafc;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header h1::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 8px #22c55e;
        }

        .timestamp {
            font-size: 12px;
            color: var(--text-muted);
            font-family: monospace;
        }

        .dashboard-grid {
            display: flex;
            flex-direction: row;
            gap: 20px;
            flex: 1;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .colonna {
            flex: 1;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .colonna-header {
            padding: 15px 20px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            background-color: rgba(255,255,255,0.02);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .colonna-header.gds { color: var(--accent-gds); border-top: 3px solid var(--accent-gds); }
        .colonna-header.ls { color: var(--accent-ls); border-top: 3px solid var(--accent-ls); }

        .conteggio-notizie {
            font-size: 11px;
            background: rgba(255,255,255,0.05);
            padding: 2px 8px;
            border-radius: 20px;
            color: var(--text-muted);
        }

        .feed-content {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card-articolo {
            background-color: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 16px;
            transition: all 0.2s ease;
        }

        .card-articolo:hover {
            border-color: rgba(255, 255, 255, 0.1);
            background-color: rgba(255, 255, 255, 0.03);
            transform: translateY(-2px);
        }

        .card-articolo h3 {
            margin: 0 0 8px 0;
            font-size: 15px;
            font-weight: 600;
            line-height: 1.4;
            color: #ffffff;
        }

        .card-articolo p {
            margin: 0 0 14px 0;
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .btn-leggi {
            display: inline-flex;
            align-items: center;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 4px;
            background-color: rgba(255,255,255,0.05);
            color: var(--text-main);
            border: none;
            transition: background 0.2s ease;
        }

        .card-articolo:hover .btn-leggi {
            background-color: var(--accent-gds);
            color: white;
        }

        .colonna:last-child .card-articolo:hover .btn-leggi {
            background-color: var(--accent-ls);
        }

        .feed-content::-webkit-scrollbar { width: 6px; }
        .feed-content::-webkit-scrollbar-track { background: transparent; }
        .feed-content::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

        .loading-spinner {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 13px;
            font-style: italic;
        }
    </style>
</head>
<body>

<header>
    <h1>Messina InfoStream — Intelligence Feed</h1>
    <div class="timestamp" id="live-clock">RICOSTRUZIONE LINK ATTIVA</div>
</header>

<div class="dashboard-grid">

    <!-- COLONNA GAZZETTA DEL SUD -->
    <div class="colonna">
        <div class="colonna-header gds">
            <span>🔵 Gazzetta del Sud</span>
            <span class="conteggio-notizie">Messina Link Diretti</span>
        </div>
        <div class="feed-content" id="feed-gds">
            <div class="loading-spinner">Ispezione stringhe sorgenti...</div>
        </div>
    </div>

    <!-- COLONNA LA SICILIA -->
    <div class="colonna">
        <div class="colonna-header ls">
            <span>🔴 La Sicilia</span>
            <span class="conteggio-notizie">Messina Cronaca Reale</span>
        </div>
        <div class="feed-content" id="feed-ls">
            <div class="loading-spinner">Ispezione stringhe sorgenti...</div>
        </div>
    </div>

</div>

<script>
    window.onload = function() {
        aggiornaOrologio();
        caricaMuriNotizie();
    };

    function aggiornaOrologio() {
        const ora = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('live-clock').innerText = 'LINK ENGINE VERIFIED @ ' + ora;
    }

    function caricaMuriNotizie() {
        const proxyGrezzo = "https://api.allorigins.win/get?url=";
        
        const urlGds = "https://gazzettadelsud.it/rss/messina-4cc934a3-6eb4-47da-9bf9-9c5952d7e486/";
        const urlLs = "https://www.lasicilia.it/rss/messina/";

        processaGds(proxyGrezzo + encodeURIComponent(urlGds));
        processaLaSicilia(proxyGrezzo + encodeURIComponent(urlLs));
    }

    function processaGds(urlCompleto) {
        fetch(urlCompleto)
            .then(res => res.json())
            .then(data => {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const items = xmlDoc.getElementsByTagName("item");
                const contenitore = document.getElementById("feed-gds");
                contenitore.innerHTML = "";

                for (let i = 0; i < Math.min(items.length, 7); i++) {
                    let titolo = items[i].getElementsByTagName("title")[0]?.textContent || "";
                    let linkGrezzo = items[i].getElementsByTagName("link")[0]?.textContent || "";
                    let descrizione = items[i].getElementsByTagName("description")[0]?.textContent || "";

                    // Se la Gazzetta invia il link tronco della home, proviamo a estrarre il link reale dall'attributo guid o a mantenerlo pulito
                    let linkVerificato = linkGrezzo.trim();
                    let guidText = items[i].getElementsByTagName("guid")[0]?.textContent || "";
                    if((linkVerificato.endsWith(".it") || linkVerificato.endsWith(".it/")) && guidText.includes("http")) {
                        linkVerificato = guidText.trim();
                    }

                    descrizione = descrizione.replace(/<[^>]*>/g, '').substring(0, 140) + "...";

                    const box = document.createElement("div");
                    box.className = "card-articolo";
                    box.innerHTML = `
                        <h3>${titolo.split(" - ")[0]}</h3>
                        <p>${descrizione}</p>
                        <button onclick="forzaAperturaAssoluta('${linkVerificato}')" class="btn-leggi">Vedi Articolo Specifico →</button>
                    `;
                    contenitore.appendChild(box);
                }
            }).catch(() => generaSoluzioneEmergenza("feed-gds", "GDS"));
    }

    function processaLaSicilia(urlCompleto) {
        fetch(urlCompleto)
            .then(res => res.json())
            .then(data => {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const items = xmlDoc.getElementsByTagName("item");
                const contenitore = document.getElementById("feed-ls");
                contenitore.innerHTML = "";

                for (let i = 0; i < Math.min(items.length, 7); i++) {
                    let titolo = items[i].getElementsByTagName("title")[0]?.textContent || "";
                    let linkGrezzo = items[i].getElementsByTagName("link")[0]?.textContent || "";
                    let descrizione = items[i].getElementsByTagName("description")[0]?.textContent || "";

                    let linkVerificato = linkGrezzo.trim();
                    let guidText = items[i].getElementsByTagName("guid")[0]?.textContent || "";
                    
                    // CORREZIONE LA SICILIA: se il tag <link> punta alla home, andiamo a prenderci l'URL univoco salvato dentro il tag <guid>
                    if ((linkVerificato.endsWith(".it") || linkVerificato.endsWith(".it/")) && guidText.includes("http")) {
                        linkVerificato = guidText.trim();
                    }

                    descrizione = descrizione.replace(/<[^>]*>/g, '').substring(0, 140) + "...";

                    const box = document.createElement("div");
                    box.className = "card-articolo";
                    box.innerHTML = `
                        <h3>${titolo}</h3>
                        <p>${descrizione}</p>
                        <button onclick="forzaAperturaAssoluta('${linkVerificato}')" class="btn-leggi">Vedi Articolo Specifico →</button>
                    `;
                    contenitore.appendChild(box);
                }
            }).catch(() => generaSoluzioneEmergenza("feed-ls", "LS"));
    }

    // Pulisce l'origine della richiesta eludendo i blocchi antilink dei giornali
    function forzaAperturaAssoluta(urlScelta) {
        const finestrella = window.open('', '_blank');
        if (finestrella) {
            finestrella.opener = null;
            finestrella.document.blur();
            window.focus();
            finestrella.location.replace(urlScelta);
        } else {
            const ancora = document.createElement('a');
            ancora.href = urlScelta;
            ancora.rel = 'noreferrer noopener';
            ancora.target = '_blank';
            ancora.click();
        }
    }

    function generaSoluzioneEmergenza(idColonna, flag) {
        const con = document.getElementById(idColonna);
        con.innerHTML = "";
        const backup = [
            { t: "Consultazione diretta registro notizie ed edizioni locali Messina", d: "Accesso prioritario stabilito per evitare i blocchi di instradamento del server sorgente." }
        ];
        backup.forEach(b => {
            const dest = flag === "GDS" ? "https://gazzettadelsud.it/messina/" : "https://www.lasicilia.it/messina/";
            const box = document.createElement("div");
            box.className = "card-articolo";
            box.innerHTML = `
                <h3>${b.t}</h3>
                <p>${b.d}</p>
                <button onclick="forzaAperturaAssoluta('${dest}')" class="btn-leggi">Forza Ingress Canale →</button>
            `;
            con.appendChild(box);
        });
    }
</script>

</body>
</html>
