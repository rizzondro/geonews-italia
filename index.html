<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Messina News Dashboard</title>
    <style>
        body { background: #0b0f19; color: white; font-family: sans-serif; display: flex; gap: 20px; padding: 20px; }
        .col { flex: 1; border: 1px solid #1e293b; padding: 15px; border-radius: 8px; background: #131a2c; }
        .articolo { margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #1e293b; }
        a { color: #3b82f6; text-decoration: none; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="col" id="col-gds"><h3>🔵 Gazzetta del Sud</h3></div>
<div class="col" id="col-ls"><h3>🔴 La Sicilia</h3></div>

<script>
    // Usiamo il servizio feed.rss2json.com che è il più affidabile per convertire RSS in oggetti JavaScript leggibili
    const api = "https://api.rss2json.com/v1/api.json?rss_url=";
    
    async function getNews(url, elementId) {
        try {
            const res = await fetch(api + encodeURIComponent(url));
            const data = await res.json();
            const container = document.getElementById(elementId);
            
            if (data.items) {
                data.items.slice(0, 5).forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'articolo';
                    div.innerHTML = `<strong>${item.title}</strong><br><a href="${item.link}" target="_blank">Leggi la notizia</a>`;
                    container.appendChild(div);
                });
            } else {
                container.innerHTML += "<p>Errore nel caricamento feed.</p>";
            }
        } catch (e) {
            console.error(e);
        }
    }

    getNews("https://gazzettadelsud.it/rss/messina-4cc934a3-6eb4-47da-9bf9-9c5952d7e486/", "col-gds");
    getNews("https://www.lasicilia.it/rss/messina/", "col-ls");
</script>

</body>
</html>
