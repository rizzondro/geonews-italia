<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rassegna Stampa Messina Real-Time</title>
    <style>
        :root {
            --primary: #0f172a;
            --gds-color: #1d4ed8;
            --ls-color: #b91c1c;
            --bg: #f8fafc;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: #1e293b;
        }

        header {
            background-color: var(--primary);
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            letter-spacing: 0.5px;
            border-bottom: 4px solid #0284c7;
        }

        .griglia-notizie {
            display: flex;
            gap: 20px;
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .colonna {
            flex: 1;
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .titolo-giornale {
            font-size: 18px;
            font-weight: bold;
            padding-bottom: 10px;
            margin-bottom: 20px;
            border-bottom: 3px solid #e2e8f0;
            text-transform: uppercase;
        }
        .border-gds { color: var(--gds-color); border-bottom-color: var(--gds-color); }
        .border-ls { color: var(--ls-color); border-bottom-color: var(--ls-color); }

        .scheda-notizia {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f1f5f9;
        }
        
        .scheda-notizia h3 {
            margin: 0 0 6px 0;
            font-size: 15px;
            line-height: 1.4;
            color: #0f172a;
        }

        .scheda-notizia p {
            margin: 0 0 10px 0;
            font-size: 13px;
            color: #475569;
            line-height: 1.5;
        }

        .scheda-notizia a {
            font-size: 12px;
            font-weight: bold;
            color: #0284c7;
            text-decoration: none;
        }
        .scheda-notizia a:hover {
            text-decoration: underline;
        }

        .caricamento {
            font-style: italic;
            color: #64748b;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

<header>
    📰 RASSEGNA STAMPA DI MESSINA — TITOLI E SINTESI LIVE
</header>

<div class="griglia-notizie">

    <!-- COLONNA GAZZETTA DEL SUD -->
    <div class="colonna">
        <div class="titolo-giornale border-gds">🔵 Gazzetta del Sud</div>
        <div id="box-gds">
            <div class="caricamento">Lettura della prima pagina di Messina...</div>
        </div>
    </div>

    <!-- COLONNA LA SICILIA -->
    <div class="colonna">
        <div class="titolo-giornale border-ls">🔴 La Sicilia</div>
        <div id="box-ls">
            <div class="caricamento">Lettura della prima pagina di Messina...</div>
        </div>
    </div>

</div>

<script>
    window.onload = function() {
        leggiGazzetta();
        leggiLaSicilia();
    };

    // Lettura diretta della pagina di Messina della Gazzetta del Sud
    function leggiGazzetta() {
        const url = "https://messina.gazzettadelsud.it/";
        const proxy = "https://api.allorigins.win/get?url=" + encodeURIComponent(url);
        const container = document.getElementById("box-gds");

        fetch(proxy)
            .then(res => res.json())
            .then(data => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, "text/html");
                
                // Estraiamo gli articoli analizzando la struttura reale del sito della Gazzetta
                const articoli = doc.querySelectorAll("article, .news-item, .entry-title");
                container.innerHTML = "";

                let contatore = 0;
                articoli.forEach(art => {
                    const linkEl = art.querySelector("a");
                    const titoloText = art.innerText || art.textContent;
                    
                    if (linkEl && titoloText.trim().length > 15 && contatore < 6) {
                        let href = linkEl.getAttribute("href");
                        if (href && !href.startsWith("http")) href = "https://gazzettadelsud.it" + href;

                        const blocco = document.createElement("div");
                        blocco.className = "scheda-notizia";
                        blocco.innerHTML = `
                            <h3>${titoloText.split('\n')[0].trim()}</h3>
                            <p>Cronaca locale in tempo reale. Clicca sul link sottostante per visualizzare l'estratto completo del fatto.</p>
                            <a href="${href}" target="_blank">Leggi la notizia originale →</a>
                        `;
                        container.appendChild(blocco);
                        contatore++;
                    }
                });

                if (contatore === 0) {
                    container.innerHTML = "<div class='caricamento'>Nessuna notizia estratta. Riprovare tra poco.</div>";
                }
            })
            .catch(() => {
                container.innerHTML = "<div class='caricamento'>⚠️ Connessione protetta dal server della Gazzetta.</div>";
            });
    }

    // Lettura diretta della pagina di Messina de La Sicilia
    function leggiLaSicilia() {
        const url = "https://www.lasicilia.it/messina/";
        const proxy = "https://api.allorigins.win/get?url=" + encodeURIComponent(url);
        const container = document.getElementById("box-ls");

        fetch(proxy)
            .then(res => res.json())
            .then(data => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, "text/html");
                
                // Estraiamo gli articoli analizzando la struttura reale del sito de La Sicilia
                const articoli = doc.querySelectorAll(".card-news, article, h2, h3");
                container.innerHTML = "";

                let contatore = 0;
                articoli.forEach(art => {
                    const linkEl = art.querySelector("a") || (art.tagName === "A" ? art : null);
                    const titoloText = art.textContent || art.innerText;

                    if (linkEl && titoloText.trim().length > 20 && contatore < 6) {
                        let href = linkEl.getAttribute("href");
                        if (href && !href.startsWith("http")) href = "https://www.lasicilia.it" + href;

                        const blocco = document.createElement("div");
                        blocco.className = "scheda-notizia";
                        blocco.innerHTML = `
                            <h3>${titoloText.trim()}</h3>
                            <p>Aggiornamento dalla redazione di Messina. Clicca sotto per aprire la pagina dedicata.</p>
                            <a href="${href}" target="_blank">Leggi la notizia originale →</a>
                        `;
                        container.appendChild(blocco);
                        contatore++;
                    }
                });

                if (contatore === 0) {
                    container.innerHTML = "<div class='caricamento'>Nessuna notizia estratta. Riprovare tra poco.</div>";
                }
            })
            .catch(() => {
                container.innerHTML = "<div class='caricamento'>⚠️ Connessione protetta dal server de La Sicilia.</div>";
            });
    }
</script>

</body>
</html>
