<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rassegna Stampa Messina Pulita</title>
    <style>
        :root {
            --primary: #0f172a;
            --gds-color: #1d4ed8;
            --ls-color: #b91c1c;
            --bg: #f8fafc;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: #1e293b;
        }

        header {
            background-color: var(--primary);
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            letter-spacing: 0.5px;
            border-bottom: 4px solid #0284c7;
        }

        /* Contenitore per affiancare le due colonne sul PC */
        .griglia-notizie {
            display: flex;
            gap: 20px;
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .colonna {
            flex: 1;
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .titolo-giornale {
            font-size: 18px;
            font-weight: bold;
            padding-bottom: 10px;
            margin-bottom: 20px;
            border-bottom: 3px solid #e2e8f0;
            text-transform: uppercase;
        }
        .border-gds { color: var(--gds-color); border-bottom-color: var(--gds-color); }
        .border-ls { color: var(--ls-color); border-bottom-color: var(--ls-color); }

        /* Stile delle schede notizie: Pulito (Titolo, Riassunto, Link) */
        .scheda-notizia {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f1f5f9;
        }
        
        .scheda-notizia h3 {
            margin: 0 0 6px 0;
            font-size: 15px;
            line-height: 1.4;
            color: #0f172a;
        }

        .scheda-notizia p {
            margin: 0 0 10px 0;
            font-size: 13px;
            color: #475569;
            line-height: 1.5;
        }

        .scheda-notizia a {
            font-size: 12px;
            font-weight: bold;
            color: #0284c7;
            text-decoration: none;
        }
        .scheda-notizia a:hover {
            text-decoration: underline;
        }

        .caricamento {
            font-style: italic;
            color: #64748b;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

<header>
    📰 RASSEGNA STAMPA IN TEMPO REALE — PROVINCIA DI MESSINA
</header>

<div class="griglia-notizie">

    <!-- COLONNA GAZZETTA DEL SUD -->
    <div class="colonna">
        <div class="titolo-giornale border-gds">🔵 Gazzetta del Sud</div>
        <div id="box-gds">
            <div class="caricamento">Estrazione titoli reali in corso...</div>
        </div>
    </div>

    <!-- COLONNA LA SICILIA -->
    <div class="colonna">
        <div class="titolo-giornale border-ls">🔴 La Sicilia</div>
        <div id="box-ls">
            <div class="caricamento">Estrazione titoli reali in corso...</div>
        </div>
    </div>

</div>

<script>
    // I due indirizzi ufficiali di Messina
    const rssGds = "https://gazzettadelsud.it/rss/messina-4cc934a3-6eb4-47da-9bf9-9c5952d7e486/";
    const rssLs = "https://www.lasicilia.it/rss/messina/";

    // Usiamo il proxy di sblocco professionale corsproxy.io per aggirare le protezioni dei browser
    const proxySblocco = "https://corsproxy.io/?";

    window.onload = function() {
        scaricaSezione(rssGds, "box-gds", "gds");
        scaricaSezione(rssLs, "box-ls", "ls");
    };

    function scaricaSezione(urlRss, idContenitore, tipo) {
        const contenitore = document.getElementById(idContenitore);

        fetch(proxySblocco + encodeURIComponent(urlRss))
            .then(res => res.text())
            .then(stringaXml => {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(stringaXml, "text/xml");
                const articoli = xmlDoc.getElementsByTagName("item");

                contenitore.innerHTML = "";

                if (articoli.length === 0) {
                    contenitore.innerHTML = "<div class='caricamento'>Nessuna notizia disponibile al momento.</div>";
                    return;
                }

                // Prendiamo i primi 6 articoli più recenti di oggi
                for (let i = 0; i < Math.min(articoli.length, 6); i++) {
                    const titolo = articoli[i].getElementsByTagName("title")[0]?.textContent || "Titolo non disponibile";
                    const link = articoli[i].getElementsByTagName("link")[0]?.textContent || "#";
                    let descrizione = articoli[i].getElementsByTagName("description")[0]?.textContent || "";

                    // Puliamo la descrizione dai tag grafici sporchi del sito originale
                    descrizione = descrizione.replace(/<[^>]*>/g, '').trim();
                    if (descrizione.length > 130) {
                        descrizione = descrizione.substring(0, 130) + "...";
                    }
                    if (!descrizione) {
                        descrizione = "Apri l'articolo per leggere la sintesi del fatto di cronaca.";
                    }

                    // Creiamo la struttura pulita richiesta: Titolo -> Riassunto -> Link poco sotto
                    const blocco = document.createElement("div");
                    blocco.className = "scheda-notizia";
                    blocco.innerHTML = `
                        <h3>${titolo}</h3>
                        <p>${descrizione}</p>
                        <a href="${link}" target="_blank">Leggi tutta la notizia su internet →</a>
                    `;
                    contenitore.appendChild(blocco);
                }
            })
            .catch(err => {
                console.error(err);
                contenitore.innerHTML = "<div class='caricamento'>⚠️ Impossibile leggere questa redazione. Il server del giornale ha bloccato la connessione.</div>";
            });
    }
</script>

</body>
</html>
