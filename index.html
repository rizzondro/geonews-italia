<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notizie Messina - Titoli e Link Diretti</title>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #0284c7;
            --light: #f8fafc;
            --gds-color: #1d4ed8;
            --ls-color: #b91c1c;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--light);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        header {
            background-color: var(--primary);
            color: white;
            padding: 12px;
            text-align: center;
            border-bottom: 4px solid var(--accent);
        }
        header h1 { margin: 0; font-size: 18px; letter-spacing: 0.5px; }

        /* Contenitore per affiancare le due sezioni */
        .Rassegna-Split {
            display: flex;
            flex-direction: column;
            height: calc(100% - 48px);
            width: 100%;
        }

        .colonna-giornale {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .insegna-giornale {
            color: white;
            padding: 10px 15px;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .bg-gds { background-color: var(--gds-color); }
        .bg-ls { background-color: var(--ls-color); }

        /* Finestra contenente l'elenco pulito di Google News */
        .finestra-notizie {
            width: 100%;
            flex: 1;
            border: none;
            background: #fff;
        }

        /* Se lo schermo è largo (PC o telefono girato in orizzontale) affianca le colonne */
        @media (min-width: 768px) {
            .Rassegna-Split {
                flex-direction: row;
            }
            .colonna-giornale:first-child {
                border-right: 3px solid #cbd5e1;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>📰 TITOLI E LINK DIRETTI — MESSINA CRONACA</h1>
</header>

<div class="Rassegna-Split">
    
    <!-- SINISTRA: GAZZETTA DEL SUD (Tramite ricerca sicura Google News) -->
    <div class="colonna-giornale">
        <div class="insegna-giornale bg-gds">🔵 Gazzetta del Sud — Ultimi Titoli</div>
        <iframe class="finestra-notizie" 
                src="https://news.google.com/publications/CAAqBwgKMKGy0Asw3v7HAw?hl=it&gl=IT&ceid=IT%3Ait">
        </iframe>
    </div>

    <!-- DESTRA: LA SICILIA (Tramite ricerca sicura Google News) -->
    <div class="colonna-giornale">
        <div class="insegna-giornale bg-ls">🔴 La Sicilia — Ultimi Titoli</div>
        <iframe class="finestra-notizie" 
                src="https://news.google.com/search?q=site%3Alasicilia.it%20messina&hl=it&gl=IT&ceid=IT%3Ait">
        </iframe>
    </div>

</div>

</body>
</html>
