<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rassegna Stampa Messina - Affiancata</title>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #0284c7;
            --light: #f8fafc;
            --gds-color: #1d4ed8;
            --ls-color: #b91c1c;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--light);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; /* Evita il doppio scorrimento della pagina principale */
        }

        header {
            background-color: var(--primary);
            color: white;
            padding: 10px 15px;
            text-align: center;
            border-bottom: 3px solid var(--accent);
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        header h1 { 
            margin: 0; 
            font-size: 16px; 
            letter-spacing: 0.5px;
        }

        /* Contenitore principale flessibile */
        .Rassegna-Split {
            display: flex;
            flex-direction: column; /* Di base si incolonnano sui display piccoli */
            height: calc(100% - 63px); /* Sottrae l'altezza dell'header */
            width: 100%;
        }

        .colonna-giornale {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-bottom: 2px solid #cbd5e1;
        }

        .insegna-giornale {
            color: white;
            padding: 8px 12px;
            font-weight: bold;
            font-size: 13px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .bg-gds { background-color: var(--gds-color); }
        .bg-ls { background-color: var(--ls-color); }

        /* Finestra web a tutto schermo dentro la sua colonna */
        .finestra-web {
            width: 100%;
            flex: 1;
            border: none;
            background: #fff;
        }

        /* REGOLA REGISTRATA: Se lo schermo è largo (PC, Tablet o Telefono Girato di Lato) affianca le finestre */
        @media (min-width: 768px) {
            .Rassegna-Split {
                flex-direction: row; /* Affiancamento orizzontale */
            }
            .colonna-giornale {
                border-bottom: none;
            }
            .colonna-giornale:first-child {
                border-right: 2px solid #cbd5e1; /* Separatore verticale tra i due giornali */
            }
        }
    </style>
</head>
<body>

<header>
    <h1>📰 RASSEGNA STAMPA LIVE — PROVINCIA DI MESSINA</h1>
</header>

<div class="Rassegna-Split">
    
    <!-- SINISTRA: GAZZETTA DEL SUD -->
    <div class="colonna-giornale">
        <div class="insegna-giornale bg-gds">🔵 Gazzetta del Sud — Messina</div>
        <iframe class="finestra-web" src="https://messina.gazzettadelsud.it/"></iframe>
    </div>

    <!-- DESTRA: LA SICILIA -->
    <div class="colonna-giornale">
        <div class="insegna-giornale bg-ls">🔴 La Sicilia — Messina</div>
        <iframe class="finestra-web" src="https://www.lasicilia.it/messina/"></iframe>
    </div>

</div>

</body>
</html>
